name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */3 * *' # every 3 days
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "Missing SUPABASE_URL secret"
            exit 1
          fi

          if [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing SUPABASE_ANON_KEY secret"
            exit 1
          fi

          SUPABASE_URL="${SUPABASE_URL%/}"
          if [[ ! "$SUPABASE_URL" =~ ^https://[a-z0-9-]+\.supabase\.co$ ]]; then
            echo "SUPABASE_URL must look like https://<project-ref>.supabase.co"
            exit 1
          fi

          STATUS=$(curl --silent --show-error --location --retry 3 --retry-all-errors --connect-timeout 10 --max-time 30 \
            --output /dev/null --write-out "%{http_code}" "$SUPABASE_URL/auth/v1/health" \
            -H "apikey: $SUPABASE_ANON_KEY")
          echo "Response: $STATUS"
          if [ "$STATUS" -ge 400 ]; then
            echo "Ping failed with status $STATUS"
            exit 1
          fi
