name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */3 * *' # every 3 days
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Response: $STATUS"
          if [ "$STATUS" -ge 400 ]; then
            echo "Ping failed with status $STATUS"
            exit 1
          fi
